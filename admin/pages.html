<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex,nofollow" />
<title>Pages index — Coconut LP Factory</title>
<link rel="icon" href="/public/favicon.png" />
<style>
  :root { --green:#2E9B58; --green-dark:#0F7B3F; --ink:#111; --border:#e2e2dc; --bg:#FAFAF7; --soft:#EAF7EF; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:'Inter Tight','Helvetica Neue',Helvetica,Arial,sans-serif; background:var(--bg); color:var(--ink); font-size:15px; line-height:1.5; }
  .wrap { max-width:960px; margin:0 auto; padding:36px 24px 80px; }
  .brand { display:flex; align-items:center; gap:14px; margin-bottom:6px; }
  .brand img { height:34px; width:auto; }
  h1 { font-size:26px; font-weight:800; margin:0; }
  .sub { color:#555; margin:2px 0 26px; font-size:14px; }
  .bar { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
  .bar .count { color:#555; font-size:13px; }
  button { font:inherit; font-weight:700; border:1px solid var(--ink); background:var(--ink); color:#fff; border-radius:8px; padding:8px 16px; cursor:pointer; }
  button:hover { opacity:.88; }
  table { border-collapse:collapse; width:100%; background:#fff; border:1px solid var(--border); border-radius:12px; overflow:hidden; }
  th, td { border-bottom:1px solid var(--border); padding:12px 14px; text-align:left; vertical-align:top; font-size:14px; }
  th { background:#f4f4ef; font-size:12px; text-transform:uppercase; letter-spacing:.04em; color:#444; }
  tr:last-child td { border-bottom:none; }
  td.pl { font-weight:700; white-space:nowrap; }
  td.hl { color:#333; }
  a { color:var(--green-dark); font-weight:700; text-decoration:none; }
  a:hover { text-decoration:underline; }
  .login { max-width:340px; margin:110px auto; background:#fff; border:1px solid var(--border); border-radius:14px; padding:28px; }
  .login h2 { margin:0 0 12px; font-size:18px; }
  .login input { width:100%; font:inherit; padding:9px 10px; border:1px solid #ccc; border-radius:8px; margin-bottom:10px; }
  .err { color:#c0392b; font-size:13px; min-height:18px; }
  .hidden { display:none !important; }
  .backlink { font-size:13px; margin-bottom:22px; display:inline-block; }

  /* --- Ad creative generator (added; does not affect existing styles) --- */
  @font-face {
    font-family: 'Inter Tight';
    font-style: normal;
    font-weight: 100 900;
    font-display: swap;
    src: url('/public/fonts/inter-tight-roman-latin.woff2') format('woff2-variations'),
         url('/public/fonts/inter-tight-roman-latin.woff2') format('woff2');
  }
  .genBtn { background:none; border:none; color:#9aa; padding:2px 6px; font-size:16px; cursor:pointer; line-height:1; }
  .genBtn:hover { color:var(--green-dark); opacity:1; }
  .modal-backdrop { position:fixed; inset:0; background:rgba(11,30,63,.45); z-index:50; display:flex; align-items:center; justify-content:center; padding:20px; }
  .modal { background:#fff; border-radius:14px; max-width:680px; width:100%; max-height:92vh; overflow:auto; padding:24px 26px; }
  .modal h3 { margin:0 0 4px; font-size:18px; }
  .modal .hint { color:#555; font-size:13px; margin:0 0 18px; }
  .modal .cols { display:flex; gap:26px; flex-wrap:wrap; }
  .modal .col { flex:1; min-width:220px; }
  .modal .col h4 { margin:0 0 8px; font-size:12px; text-transform:uppercase; letter-spacing:.05em; color:#444; }
  .modal label.opt { display:flex; align-items:center; gap:10px; padding:7px 8px; border:1px solid var(--border); border-radius:8px; margin-bottom:6px; cursor:pointer; font-size:14px; }
  .modal label.opt:hover { border-color:var(--green-dark); }
  .modal label.opt img.lg { height:22px; width:auto; max-width:110px; }
  .modal label.opt img.fc { height:42px; width:42px; object-fit:cover; object-position:top; border-radius:50%; background:var(--soft); }
  .modal .actions { display:flex; gap:10px; align-items:center; margin-top:18px; }
  .modal .cancel { background:#fff; color:var(--ink); }
  .modal .status { font-size:13px; color:#555; }
  .modal .preview { margin-top:16px; }
  .modal .preview img { width:100%; border-radius:10px; border:1px solid var(--border); }

  /* creative template (true 1080x1080, rendered off-screen for capture) */
  #genStaging { position:fixed; left:-3000px; top:0; }
  .adc { width:1080px; height:1080px; background:linear-gradient(115deg, #DCEEFF 0%, #E5F5EA 60%, #C9F0D6 100%);
    display:flex; flex-direction:column; justify-content:flex-start; padding:80px; position:relative; overflow:hidden;
    font-family:'Inter Tight','Helvetica Neue',Helvetica,Arial,sans-serif; }
  .adc .brand { width:330px; height:auto; display:block; position:relative; z-index:2; }
  .adc .copy { display:flex; flex-direction:column; gap:0; margin-top:96px; position:relative; z-index:2; }
  .adc .offer { margin-top:44px; }
  .adc .headline + .offer { margin-top:44px; }
  .adc .eyebrow { position:absolute; top:86px; left:600px; width:400px; z-index:2; text-align:right;
    font-size:26px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--green-dark); line-height:1.35; }
  .adc .headline { margin:0; color:#0B1E3F; font-weight:900; line-height:1.06; letter-spacing:-0.015em; font-size:88px; }
  .adc .offer { align-self:flex-start; background:var(--green-dark); color:#fff; font-weight:800; font-size:38px; padding:16px 36px; border-radius:999px; }
  .adc .proof { display:flex; flex-wrap:wrap; align-items:center; font-size:27px; font-weight:600; color:#3d5570; margin-top:36px; }
  .adc .proof > span { margin:6px 44px 0 0; white-space:nowrap; }
  .adc .proof .stars { color:#F5A623; font-size:30px; letter-spacing:3px; margin-right:10px; }
  .adc .toolrow { position:relative; z-index:2; margin-top:52px; }
  .adc .toolrow img { display:block; width:auto; height:auto; }
  .adc .face { position:absolute; right:0; bottom:0; z-index:1; height:720px; width:auto; }
  .adc.has-face .copy { padding-right:380px; }
  .adc.has-face .headline { font-size:72px; }
  .adc.has-face.no-logo .face { height:780px; }
</style>
</head>
<body>
  <div class="login hidden" id="login">
    <h2>🥥 Pages index</h2>
    <input type="password" id="pw" placeholder="Admin password" />
    <button id="loginBtn" style="width:100%">Enter</button>
    <div class="err" id="loginErr"></div>
  </div>

  <div class="wrap hidden" id="app">
    <a class="backlink" href="/admin/">← Back to the builder</a>
    <div class="brand">
      <img src="/public/coconut-logo.png" alt="Coconut" />
      <h1>Pages index</h1>
    </div>
    <p class="sub">Every published landing page in the factory — title, hero headline, and live link.</p>
    <div class="bar">
      <button id="csvBtn">Download CSV</button>
      <span class="count" id="count"></span>
    </div>
    <table>
      <thead><tr><th>Page</th><th>Headline</th><th>Link</th><th></th></tr></thead>
      <tbody id="rows"></tbody>
    </table>
  </div>

<script>
(function () {
  'use strict';
  function $(id) { return document.getElementById(id); }
  var pw = sessionStorage.getItem('lp_pw') || '';
  var pages = [], BASE_URL = '';

  function stripHtml(s) {
    var d = document.createElement('div');
    d.innerHTML = String(s || '').replace(/<br\s*\/?>/gi, ' ');
    return (d.textContent || '').replace(/\s+/g, ' ').trim();
  }
  function pageUrl(slug) { return (BASE_URL || location.origin) + '/' + slug + '/'; }

  function fetchPages(p) {
    return fetch('/api/pages', { headers: { 'x-admin-password': p } })
      .then(function (r) { if (!r.ok) throw new Error('auth'); return r.json(); });
  }

  function render() {
    var tb = $('rows');
    tb.innerHTML = pages.map(function (p) {
      var url = pageUrl(p.slug);
      return '<tr><td class="pl">' + esc(p.pageLabel || p.slug) + '</td>' +
             '<td class="hl">' + esc(stripHtml(p.hero && p.hero.h1)) + '</td>' +
             '<td><a href="' + url + '" target="_blank">' + esc(url.replace(/^https?:\/\//, '')) + '</a></td>' +
             '<td><button class="genBtn" data-slug="' + esc(p.slug) + '" title="Generate ad creative">&#128444;</button></td></tr>';
    }).join('');
    $('count').textContent = pages.length + ' page' + (pages.length === 1 ? '' : 's');
  }
  function esc(s) { return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

  $('csvBtn').addEventListener('click', function () {
    var q = function (v) { return '"' + String(v == null ? '' : v).replace(/"/g, '""') + '"'; };
    var lines = ['slug,page_label,headline,url'];
    pages.forEach(function (p) {
      lines.push([q(p.slug), q(p.pageLabel || ''), q(stripHtml(p.hero && p.hero.h1)), q(pageUrl(p.slug))].join(','));
    });
    var blob = new Blob(['\uFEFF' + lines.join('\r\n') + '\r\n'], { type: 'text/csv;charset=utf-8' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'coconut-pages.csv';
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(a.href);
  });

  function boot(d) {
    pages = d.pages || []; BASE_URL = d.baseUrl || '';
    window.__lpPages = pages;
    $('login').className = 'login hidden';
    $('app').className = 'wrap';
    render();
  }
  $('loginBtn').addEventListener('click', function () {
    var p = $('pw').value;
    fetchPages(p).then(function (d) {
      pw = p; sessionStorage.setItem('lp_pw', p);
      boot(d);
    }).catch(function () { $('loginErr').textContent = 'Wrong password.'; });
  });
  $('pw').addEventListener('keydown', function (e) { if (e.key === 'Enter') $('loginBtn').click(); });

  if (pw) {
    fetchPages(pw).then(boot).catch(function () {
      sessionStorage.removeItem('lp_pw');
      $('login').className = 'login';
    });
  } else {
    $('login').className = 'login';
  }
})();
</script>

<!-- === Ad creative generator (additive; nothing above depends on this) === -->
<div id="genStaging"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
(function () {
  'use strict';
  var FACES = null; // loaded lazily from /public/faces/manifest.json

  function el(tag, cls, html) { var e = document.createElement(tag); if (cls) e.className = cls; if (html != null) e.innerHTML = html; return e; }
  function esc(s) { return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

  function loadFaces() {
    if (FACES) return Promise.resolve(FACES);
    return fetch('/public/faces/manifest.json')
      .then(function (r) { return r.ok ? r.json() : []; })
      .catch(function () { return []; })
      .then(function (list) { FACES = list; return list; });
  }

  function openModal(page) {
    loadFaces().then(function (faces) {
      var bd = el('div', 'modal-backdrop');
      var logoOpts = (page.tools && page.tools.items || []).map(function (t, i) {
        return '<label class="opt"><input type="radio" name="genLogo" value="' + esc(t.file) + '"' + (i === 0 ? ' checked' : '') + '/>' +
               '<img class="lg" src="/public/logos/' + esc(t.file) + '" alt=""/> ' + esc(t.alt || t.file) + '</label>';
      }).join('') + '<label class="opt"><input type="radio" name="genLogo" value=""/>No logo</label>';
      var faceOpts = faces.map(function (f) {
        return '<label class="opt"><input type="radio" name="genFace" value="' + esc(f.file) + '"/>' +
               '<img class="fc" src="/public/faces/' + esc(f.file) + '" alt=""/> ' + esc(f.name || f.file) + '</label>';
      }).join('') + '<label class="opt"><input type="radio" name="genFace" value="" checked/>No face</label>';
      if (!faces.length) faceOpts = '<p class="hint">No faces uploaded yet (shared/public/faces/).</p>';

      bd.appendChild(el('div', 'modal',
        '<h3>Generate ad creative</h3>' +
        '<p class="hint">1080\u00d71080 PNG for Meta, using this page\u2019s hero copy. Pick a logo, a face, or one of each.</p>' +
        '<div class="cols">' +
          '<div class="col"><h4>Logo</h4>' + logoOpts + '</div>' +
          '<div class="col"><h4>Face</h4>' + faceOpts + '</div>' +
        '</div>' +
        '<h4 style="margin:16px 0 6px">CTA pill</h4>' +
        '<input type="text" id="genCta" maxlength="40" value="' + esc(page.hero && page.hero.accent || '') + '"' +
        ' style="width:100%; padding:9px 12px; border:1px solid var(--border); border-radius:8px; font-family:inherit; font-size:13px;" />' +
        '<p class="hint" style="margin:4px 0 0"><span id="genCtaCount"></span> \u2014 the green pill on the creative. Edit it freely (e.g. \u201CLearn more\u201D); leave empty for no pill. The landing page itself is not changed.</p>' +
        '<div class="actions"><button id="genGo">Generate &amp; download</button>' +
        '<button class="cancel" id="genCancel">Cancel</button><span class="status" id="genStatus"></span></div>' +
        '<div class="preview" id="genPreview"></div>'));
      document.body.appendChild(bd);
      bd.addEventListener('click', function (e) { if (e.target === bd) bd.remove(); });
      bd.querySelector('#genCancel').addEventListener('click', function () { bd.remove(); });
      var ctaInput = bd.querySelector('#genCta'), ctaCount = bd.querySelector('#genCtaCount');
      function syncCtaCount() { ctaCount.textContent = ctaInput.value.length + '/40'; }
      ctaInput.addEventListener('input', syncCtaCount); syncCtaCount();
      bd.querySelector('#genGo').addEventListener('click', function () {
        var logo = (bd.querySelector('input[name="genLogo"]:checked') || {}).value || '';
        var face = (bd.querySelector('input[name="genFace"]:checked') || {}).value || '';
        if (!logo && !face) { bd.querySelector('#genStatus').textContent = 'Pick at least a logo or a face.'; return; }
        generate(page, logo, face, ctaInput.value.trim(), bd);
      });
    });
  }

  function buildCard(page, logo, face, cta) {
    var card = el('div', 'adc' + (face ? ' has-face' : '') + (logo ? '' : ' no-logo'));
    card.innerHTML =
      '<img class="brand" src="/public/coconut-logo-lg.png" alt=""/>' +
      (page.hero && page.hero.eyebrow ? '<div class="eyebrow">' + esc(page.hero.eyebrow) + '</div>' : '') +
      '<div class="copy">' +
        '<h2 class="headline">' + String(page.hero && page.hero.h1 || '').replace(/<br\s*\/?>/gi, ' ') + '</h2>' +
        (cta ? '<div class="offer">' + esc(cta) + '</div>' : '') +
        '<div class="proof"><span><span class="stars">\u2605\u2605\u2605\u2605\u2605</span>4.9/5 rating</span>' +
        '<span>600+ companies trust us</span></div>' +
      '</div>' +
      (logo ? '<div class="toolrow"><img id="genLogoImg" src="/public/logos/' + esc(logo) + '" alt=""/></div>' : '') +
      (face ? '<img class="face" src="/public/faces/' + esc(face) + '" alt=""/>' : '');
    return card;
  }

  function generate(page, logo, face, cta, bd) {
    var status = bd.querySelector('#genStatus');
    var go = bd.querySelector('#genGo');
    go.disabled = true; status.textContent = 'Rendering\u2026';
    var staging = document.getElementById('genStaging');
    var card = buildCard(page, logo, face, cta);
    staging.appendChild(card);

    var imgs = Array.prototype.slice.call(card.querySelectorAll('img'));
    Promise.all(imgs.map(function (im) {
      return im.complete ? Promise.resolve() : new Promise(function (res) { im.onload = im.onerror = res; });
    })).then(function () { return document.fonts.ready; }).then(function () {
      // generic logo sizing: wide wordmarks capped by width, compact marks by height
      var lg = card.querySelector('#genLogoImg');
      if (lg && lg.naturalWidth) {
        if (lg.naturalWidth / lg.naturalHeight > 2.5) lg.style.width = '430px';
        else lg.style.height = '98px';
      }
      // pill fit guard: available width differs with/without face, so a fixed char cap
      // alone can't guarantee fit — shrink the pill font (38 -> 26px) until it fits its lane
      var pill = card.querySelector('.offer');
      if (pill) {
        var ps = 38, lane = card.querySelector('.copy').clientWidth;
        pill.style.maxWidth = '100%';
        while (pill.scrollWidth > lane && ps > 26) { ps -= 2; pill.style.fontSize = ps + 'px'; }
        if (pill.scrollWidth > lane) pill.style.whiteSpace = 'normal'; // last resort: wrap to 2 lines
      }
      // overflow guard: shrink the headline until everything fits inside 1080px
      var hl = card.querySelector('.headline');
      var cp = card.querySelector('.copy');
      var size = parseFloat(getComputedStyle(hl).fontSize);
      while ((cp.scrollHeight > cp.clientHeight + 2 || card.scrollHeight > 1080) && size > 46) {
        size -= 4;
        hl.style.fontSize = size + 'px';
      }
      return html2canvas(card, { scale: 1, width: 1080, height: 1080, backgroundColor: null, logging: false });
    }).then(function (canvas) {
      var stem = function (f) { return String(f).replace(/\.[a-z0-9]+$/i, '').toLowerCase().replace(/[^a-z0-9-]+/g, '-'); };
      var parts = ['coconut-ad-' + page.slug];
      if (logo) parts.push('logo-' + stem(logo));
      if (face) parts.push('face-' + stem(face));
      var a = document.createElement('a');
      a.download = parts.join('-') + '.png';
      a.href = canvas.toDataURL('image/png');
      a.click();
      var pv = bd.querySelector('#genPreview');
      pv.innerHTML = '';
      var img = new Image(); img.src = a.href; pv.appendChild(img);
      status.textContent = 'Downloaded.';
    }).catch(function (e) {
      status.textContent = 'Render failed: ' + (e && e.message || e);
    }).then(function () {
      go.disabled = false;
      if (card.parentNode) card.parentNode.removeChild(card);
    });
  }

  document.getElementById('rows').addEventListener('click', function (e) {
    var btn = e.target.closest ? e.target.closest('.genBtn') : null;
    if (!btn) return;
    var slug = btn.getAttribute('data-slug');
    var page = (window.__lpPages || []).filter(function (p) { return p.slug === slug; })[0];
    if (page) openModal(page);
  });
})();
</script>
</body>
</html>
